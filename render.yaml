services:
  - type: web
    name: automation
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://automation.maximo-seo.ai
      # Client-side env vars (baked into the JS bundle at build time)
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
