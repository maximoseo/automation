services:
  - type: web
    name: automation
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm run install:all && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/automation.db
      - key: ENCRYPTION_KEY
        generateValue: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
